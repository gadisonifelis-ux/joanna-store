<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joanna App Store Management</title>

<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;margin:0;background:#f5f6fa;}
.header{background:#2196F3;color:white;padding:15px;text-align:center;font-size:20px;}
.container{padding:10px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px;}
button{padding:10px;width:100%;background:#2196F3;color:white;border:none;border-radius:6px;}
</style>

</head>

<body>

<div class="header">Joanna App Store Management</div>

<div class="container">

<div class="card">
<h3>Karibu kwenye App yako 🎉</h3>
<p>Hii sasa ni version ya app halisi</p>
</div>

<div class="card">
<button onclick="installApp()">Install App</button>
</div>

</div>

<script>

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
 e.preventDefault();
 deferredPrompt = e;
});

function installApp(){
 if(deferredPrompt){
  deferredPrompt.prompt();
 }
}

</script>

</body>
</html>
